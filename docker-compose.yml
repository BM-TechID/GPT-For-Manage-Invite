version: '3.8'

services:
  # ----------------------------------------------------
  # 1. APLIKASI UTAMA (Bawaan GitHub)
  # ----------------------------------------------------
  web:
    build: .
    container_name: gpt-for-manage-invite-main
    ports:
      - "1001:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # ----------------------------------------------------
  # 2. APLIKASI RESELLER (Container Baru)
  # ----------------------------------------------------
  reseller:
    build: ./reseller_panel
    container_name: gpt-for-manage-invite-reseller
    ports:
      - "1002:1002"
    env_file:
      - .env
    # Environment variable untuk menghubungkan Reseller ke App Utama
    # "web" adalah nama service aplikasi utama di atas, "8080" adalah port internalnya.
    environment:
      - MAIN_APP_URL=http://web:8080/api/redeem 
    volumes:
      - ./reseller_panel/database.json:/app/database.json
    restart: unless-stopped
    depends_on:
      - web
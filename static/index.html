<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Auto Invite</title>
    <meta name="description" content="Masukkan email Anda, tebus undangan otomatis">
    <style>
        /* ... (Gunakan CSS bawaan Anda sebelumnya di sini) ... */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #050b14; color: #e2f1ff; overflow: hidden; }
        body::before { content: ''; position: fixed; top: -30%; right: -20%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 229, 255, .15) 0%, transparent 70%); z-index: 0;}
        body::after { content: ''; position: fixed; bottom: -20%; left: -15%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 85, 255, .15) 0%, transparent 70%); z-index: 0;}
        .card { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 48px 40px; margin: 20px; background: rgba(10, 20, 35, .85); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(0, 229, 255, .3); box-shadow: 0 4px 24px rgba(0, 229, 255, .1), 0 12px 48px rgba(0, 85, 255, .2); }
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
        .logo { width: 56px; height: 56px; background: linear-gradient(135deg, #0055ff, #00e5ff); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo svg { width: 28px; height: 28px; }
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-shadow: 0 0 10px #00e5ff; }
        .header p { font-size: 14px; color: #8ab4f8; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #8ab4f8; margin-bottom: 8px; }
        .input-wrap input { width: 100%; padding: 14px 16px; font-size: 15px; color: #e2f1ff; background: rgba(0, 0, 0, .4); border: 1.5px solid #1e3a5f; border-radius: 12px; outline: none; }
        .input-wrap input:focus { border-color: #00e5ff; }
        .btn-submit { width: 100%; padding: 14px 24px; font-size: 15px; font-weight: 600; color: #fff; background: linear-gradient(135deg, #0055ff, #00e5ff); border: none; border-radius: 12px; cursor: pointer; }
        .links-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; }
        .gh-link { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 10px; background: #021024; border: 1px solid #1e3a5f; color: #e2f1ff; text-decoration: none; font-size: 13px; font-weight: 600; }
        
        /* Language Toggle Style */
        .lang-switch { position: absolute; top: 20px; right: 20px; display: flex; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #1e3a5f; overflow: hidden; z-index: 10; }
        .lang-btn { padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; background: transparent; color: #4a6b8c; transition: 0.3s; }
        .lang-btn.active { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('id')" id="btn-id">ID</button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494z" fill="white"/></svg></div>
        </div>
        <div class="header">
            <h1 id="t-title">Universal Team Invite</h1>
            <p id="t-desc">Masukkan email dan kode untuk menebus undangan</p>
        </div>
        <form id="inviteForm">
            <div class="form-group">
                <label for="emailInput" id="t-email">Alamat Email</label>
                <div class="input-wrap"><input type="email" id="emailInput" required></div>
            </div>
            <div class="form-group">
                <label for="codeInput" id="t-code">Kode Undangan</label>
                <div class="input-wrap"><input type="text" id="codeInput" required></div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text" id="t-btn">Tukarkan Sekarang</span>
            </button>
        </form>
        
        <div class="links-row">
            <a class="gh-link" href="reseller.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span id="t-reseller">Portal Reseller</span>
            </a>
            <a class="gh-link" href="https://t.me/premium2in" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.686c.223-.198-.054-.31-.346-.116l-6.405 4.028-2.76-.86c-.6-.188-.614-.6.126-.89l10.814-4.17c.5-.188.95.105.814.909z"/></svg>
                Modified by Premium2in
            </a>
        </div>
    </div>

    <script>
        const dict = {
            id: { title: "Universal Team Invite", desc: "Masukkan email dan kode untuk menebus undangan", email: "Alamat Email", code: "Kode Undangan", btn: "Tukarkan Sekarang", reseller: "Portal Reseller" },
            en: { title: "Universal Team Invite", desc: "Enter your email and code to redeem the invite", email: "Email Address", code: "Invitation Code", btn: "Redeem Now", reseller: "Reseller Portal" }
        };

        function setLang(lang) {
            document.getElementById('btn-id').classList.toggle('active', lang === 'id');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('t-title').innerText = dict[lang].title;
            document.getElementById('t-desc').innerText = dict[lang].desc;
            document.getElementById('t-email').innerText = dict[lang].email;
            document.getElementById('t-code').innerText = dict[lang].code;
            document.getElementById('t-btn').innerText = dict[lang].btn;
            document.getElementById('t-reseller').innerText = dict[lang].reseller;
        }
    </script>
</body>
</html>
